<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MojaNavika</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F9FAFB;
            color: #1F2937;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 2rem;
        }

        .app-icon {
            width: 96px;
            height: 96px;
            background-color: #4F46E5;
            border-radius: 22px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-icon svg {
            width: 52px;
            height: 52px;
            fill: white;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1.125rem;
            color: #6B7280;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.125rem 1.5rem;
            background-color: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            text-decoration: none;
            color: #1F2937;
            font-size: 1.0625rem;
            font-weight: 500;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .links a:hover {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .links a .arrow {
            color: #9CA3AF;
            font-size: 1.25rem;
            transition: color 0.15s ease;
        }

        .links a:hover .arrow {
            color: #4F46E5;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #E5E7EB;
            color: #9CA3AF;
            font-size: 0.875rem;
        }

        footer a {
            color: #4F46E5;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="app-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                </svg>
            </div>
            <h1>MojaNavika</h1>
            <p class="tagline">Your private habit tracker</p>
        </header>

        <nav class="links">
            <a href="privacy.html">
                Privacy Policy
                <span class="arrow">&rsaquo;</span>
            </a>
            <a href="support.html">
                Support
                <span class="arrow">&rsaquo;</span>
            </a>
        </nav>

        <footer>
            <p>&copy; 2026 <a href="mailto:ivan.boban@softsplit.com">SoftSplit d.o.o.</a> &middot; Split, Croatia</p>
        </footer>
    </div>
</body>
</html>
